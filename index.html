<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול אישי</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c63ff'/><text y='.7em' font-size='55' x='50' text-anchor='middle' fill='white' font-family='sans-serif'>נ</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f3f0;
  --bg-gradient: linear-gradient(135deg, #f5f3f0 0%, #f0ecf8 50%, #f8f0f0 100%);
  --surface: #ffffff;
  --surface-hover: #f8f6f2;
  --card: #ffffff;
  --card-border: #eae6e0;
  --primary: #6c63ff;
  --primary-light: rgba(108,99,255,0.1);
  --primary-hover: #5a52d5;
  --secondary: #ff6b8a;
  --secondary-light: rgba(255,107,138,0.1);
  --accent: #ffc845;
  --accent-light: rgba(255,200,69,0.2);
  --success: #2dd4a0;
  --success-light: rgba(45,212,160,0.15);
  --danger: #ef4444;
  --danger-light: rgba(239,68,68,0.1);
  --text: #2d2d3f;
  --text2: #78788a;
  --text3: #b0b0c0;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 16px rgba(108,99,255,0.08);
  --shadow-lg: 0 8px 32px rgba(108,99,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --transition: 0.2s ease;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Heebo', system-ui, sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }
::selection { background: var(--primary-light); color: var(--primary); }

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
  border: 1px solid var(--card-border);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon {
  width: 36px;
  height: 36px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.header-title span {
  color: var(--primary);
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* Search */
.search-box { position: relative; }
.search-input {
  width: 180px;
  padding: 6px 10px;
  border: 1px solid var(--card-border);
  border-radius: 20px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
  width: 220px;
}
.search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  max-height: 360px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
  direction: rtl;
}
.search-results.open { display: block; }
.search-result-item {
  padding: 8px 12px;
  border-bottom: 1px solid var(--card-border);
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--surface-hover); }
.search-result-item .sr-type {
  font-size: 11px;
  font-weight: 600;
  color: var(--primary);
  margin-left: 6px;
}
.search-result-item .sr-title { font-weight: 600; color: var(--text); }
.search-result-item .sr-context {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.search-empty {
  padding: 16px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

@media (max-width: 560px) {
  .search-input { width: 120px; }
  .search-input:focus { width: 150px; }
}

.btn-icon {
  width: 36px;
  height: 36px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text2);
  transition: var(--transition);
}
.btn-icon:hover {
  background: var(--surface-hover);
  color: var(--primary);
  border-color: var(--primary);
}

/* ===== WEEK NAV ===== */
.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 16px;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-sm);
}
.week-nav-btn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--surface-hover);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text2);
  transition: var(--transition);
  flex-shrink: 0;
}
.week-nav-btn:hover {
  background: var(--primary-light);
  color: var(--primary);
}
.week-days {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
  justify-content: center;
}
.week-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  min-width: 48px;
  border: none;
  background: transparent;
  font-family: inherit;
  gap: 2px;
}
.week-day:hover {
  background: var(--surface-hover);
}
.week-day.active {
  background: var(--primary);
  color: #fff;
}
.week-day.active .day-name,
.week-day.active .day-num {
  color: #fff;
}
.week-day.today:not(.active) {
  border: 1px solid var(--primary);
}
.week-day .day-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
}
.week-day .day-num {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.week-day .day-count {
  font-size: 9px;
  color: var(--text3);
  background: var(--surface-hover);
  padding: 0 5px;
  border-radius: 10px;
  min-width: 16px;
  text-align: center;
}
.week-day.active .day-count {
  background: rgba(255,255,255,0.25);
  color: #fff;
}
.today-btn {
  padding: 6px 14px;
  border: 1px solid var(--primary);
  border-radius: var(--radius-sm);
  background: var(--primary-light);
  color: var(--primary);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.today-btn:hover {
  background: var(--primary);
  color: #fff;
}

/* ===== SUGGESTIONS ===== */
.suggestions-bar {
  margin-bottom: 16px;
  display: none;
}
.suggestions-bar.has-suggestions { display: block; }
.suggestions-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--accent-light);
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid rgba(255,200,69,0.3);
  border-bottom: none;
  font-size: 13px;
  font-weight: 600;
  color: #8a6d00;
}
.suggestions-list {
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.suggestion-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface-hover);
  border-radius: var(--radius-sm);
  border: 1px solid var(--card-border);
  transition: var(--transition);
}
.suggestion-item:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.suggestion-info {
  flex: 1;
  min-width: 0;
}
.suggestion-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.suggestion-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}
.suggestion-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.suggestion-btn {
  padding: 4px 10px;
  border: none;
  border-radius: var(--radius-xs);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}
.suggestion-btn.accept {
  background: var(--success-light);
  color: #059669;
}
.suggestion-btn.accept:hover {
  background: var(--success);
  color: #fff;
}
.suggestion-btn.postpone {
  background: var(--accent-light);
  color: #8a6d00;
}
.suggestion-btn.postpone:hover {
  background: var(--accent);
  color: #fff;
}
.suggestion-btn.dismiss {
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--card-border);
}
.suggestion-btn.dismiss:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.suggestion-btn.delete {
  background: var(--danger-light);
  color: var(--danger);
}
.suggestion-btn.delete:hover {
  background: var(--danger);
  color: #fff;
}

/* ===== ADD TASK FORM ===== */
.add-task-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 14px 18px;
  background: var(--surface);
  border: 2px dashed var(--card-border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}
.add-task-toggle:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}
.add-task-toggle .plus {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--primary-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--primary);
  transition: var(--transition);
}
.add-task-toggle:hover .plus {
  background: var(--primary);
  color: #fff;
}

.add-task-form {
  display: none;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  animation: slideDown 0.25s ease;
}
.add-task-form.open { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.form-group {
  flex: 1;
  min-width: 120px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 4px;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.form-group input[type="time"] {
  direction: ltr;
  text-align: left;
}
.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.btn {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover {
  background: var(--primary-hover);
  box-shadow: var(--shadow);
}
.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--card-border);
}
.btn-outline:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.btn-danger {
  background: var(--danger-light);
  color: var(--danger);
}
.btn-danger:hover {
  background: var(--danger);
  color: #fff;
}
.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
}

/* ===== RECURRENCE ===== */
.recurrence-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.recurrence-option {
  padding: 4px 12px;
  border: 1px solid var(--card-border);
  border-radius: 20px;
  background: var(--surface);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text2);
}
.recurrence-option:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.recurrence-option.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.days-picker {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}
.day-pick {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--surface);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text2);
}
.day-pick:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.day-pick.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ===== TASK LIST ===== */
.task-date-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 8px;
}
.task-date-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.task-date-subtitle {
  font-size: 12px;
  color: var(--text2);
}
.task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
}
.task-list-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
}
.task-list-empty .empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.task-card {
  display: flex;
  align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  cursor: default;
  position: relative;
}
.task-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow);
}
.task-card.completed {
  opacity: 0.6;
}
.task-card.completed .task-title {
  text-decoration: line-through;
  color: var(--text2);
}
.task-card.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-light);
}
.task-card::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--primary);
  border-radius: 0 4px 4px 0;
  opacity: 0.3;
}
.task-card.completed::before {
  background: var(--success);
  opacity: 0.5;
}

.task-select {
  display: flex;
  align-items: center;
  padding: 0 12px 0 8px;
}
.task-select input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--primary);
  cursor: pointer;
  border-radius: 4px;
}

.task-time {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px 12px 4px;
  min-width: 60px;
  flex-shrink: 0;
}
.task-time-main {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.task-time-duration {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.task-body {
  flex: 1;
  padding: 12px 4px 12px 12px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
}
.task-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.task-desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 3px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
  overflow: hidden;
}
.task-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface-hover);
  color: var(--text2);
}
.task-tag.recurring {
  background: var(--accent-light);
  color: #8a6d00;
}

.task-complete {
  display: flex;
  align-items: center;
  padding: 0 12px;
}
.task-complete-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
}
.task-complete-btn:hover {
  border-color: var(--success);
  color: var(--success-light);
}
.task-complete-btn.done {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}
.task-complete-btn.done:hover {
  background: var(--danger);
  border-color: var(--danger);
  color: #fff;
}

.task-reschedule {
  display: flex;
  align-items: center;
  padding: 0 4px 0 8px;
}
.task-reschedule-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text3);
}
.task-reschedule-btn:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}

/* Duration-based sizing */
.task-card.duration-xs {
  min-height: 36px;
  margin-right: 6%;
}
.task-card.duration-xs .task-time { padding: 4px 8px 4px 4px; min-width: 44px; }
.task-card.duration-xs .task-time-main { font-size: 13px; }
.task-card.duration-xs .task-time-duration { display: none; }
.task-card.duration-xs .task-body { padding: 4px 4px 4px 8px; }
.task-card.duration-xs .task-title { font-size: 13px; }
.task-card.duration-xs .task-desc { display: none; }
.task-card.duration-xs .task-meta { display: none; }
.task-card.duration-xs .task-select { padding: 0 6px 0 4px; }
.task-card.duration-xs .task-complete { padding: 0 6px; }
.task-card.duration-xs .task-complete-btn { width: 22px; height: 22px; font-size: 11px; }
.task-card.duration-xs .task-reschedule { padding: 0 2px 0 4px; }
.task-card.duration-xs .task-reschedule-btn { width: 22px; height: 22px; font-size: 11px; }

.task-card.duration-sm {
  min-height: 48px;
  margin-right: 3%;
}
.task-card.duration-sm .task-time { padding: 8px 8px 8px 4px; min-width: 50px; }
.task-card.duration-sm .task-time-main { font-size: 15px; }
.task-card.duration-sm .task-body { padding: 8px 4px 8px 12px; max-height: 32px; }
.task-card.duration-sm .task-desc { display: none; }
.task-card.duration-sm .task-title { font-size: 14px; }

.task-card.duration-md {
  min-height: 64px;
}
.task-card.duration-md .task-time { padding: 14px 10px 14px 4px; min-width: 56px; }
.task-card.duration-md .task-body { padding: 14px 4px 14px 12px; }

.task-card.duration-lg {
  min-height: 80px;
}
.task-card.duration-lg .task-time { padding: 18px 12px 18px 4px; min-width: 62px; }
.task-card.duration-lg .task-body { padding: 18px 4px 18px 12px; }

/* Completed task collapse */
.task-card.completed {
  min-height: 0 !important;
  max-height: 38px;
  opacity: 0.5;
  transition: var(--transition);
}
.task-card.completed.duration-xs { max-height: 28px; }
.task-card.completed .task-body { padding: 6px 4px 6px 12px; }
.task-card.completed .task-time { padding: 6px 8px 6px 4px; min-width: 44px; }
.task-card.completed .task-time-main { font-size: 13px; }
.task-card.completed .task-time-duration { display: none; }
.task-card.completed .task-meta { display: none; }
.task-card.completed .task-title { font-size: 13px; font-weight: 500; }
.task-card.completed .task-select { padding: 0 6px 0 4px; }
.task-card.completed .task-complete { padding: 0 6px; }
.task-card.completed .task-complete-btn { width: 22px; height: 22px; font-size: 11px; }
.task-card.completed .task-reschedule { padding: 0 2px 0 4px; }
.task-card.completed .task-reschedule-btn { width: 22px; height: 22px; font-size: 11px; }
.task-card.completed .task-desc { display: none; }

/* Expanded state */
.task-card.expanded {
  min-height: 0 !important;
  max-height: none !important;
}
.task-card.expanded .task-desc { display: -webkit-box !important; }
.task-card.expanded .task-meta { display: flex !important; }
.task-card.expanded .task-body { max-height: none !important; }
.task-card.expanded .task-title { white-space: normal !important; }
.task-card.expanded.duration-xs .task-desc { display: block !important; }
.task-card.expanded.duration-sm .task-desc { display: block !important; }
.task-card.expanded.completed { max-height: none !important; opacity: 1 !important; }
.task-card.expanded.completed .task-title { text-decoration: none !important; }

/* Edit button */
.task-edit {
  display: flex;
  align-items: center;
  padding: 0 2px 0 6px;
}
.task-edit-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text3);
}
.task-edit-btn:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}

/* Resizable textarea */
.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

/* Sync status indicator */
.sync-status {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  padding: 4px 8px;
  border-radius: 20px;
  background: var(--surface-hover);
  white-space: nowrap;
  transition: var(--transition);
}
.sync-status.syncing {
  color: var(--accent);
  background: var(--accent-light);
}
.sync-status.synced {
  color: var(--success);
  background: var(--success-light);
}
.sync-status.error {
  color: var(--danger);
  background: var(--danger-light);
}
.sync-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text3);
}
.sync-status.syncing .sync-status-dot {
  background: var(--accent);
  animation: pulse 1s infinite;
}
.sync-status.synced .sync-status-dot { background: var(--success); }
.sync-status.error .sync-status-dot { background: var(--danger); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Unscheduled tasks */
.unscheduled-section {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--card-border);
}
.unscheduled-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  background: var(--surface-hover);
  transition: var(--transition);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  border: none;
  width: 100%;
}
.unscheduled-header:hover {
  background: var(--primary-light);
  color: var(--primary);
}
.unscheduled-header .arrow {
  transition: transform 0.2s;
  font-size: 12px;
}
.unscheduled-header.open .arrow {
  transform: rotate(90deg);
}
.unscheduled-body {
  display: none;
  margin-top: 8px;
}
.unscheduled-body.open { display: block; }
.unscheduled-body .task-list { gap: 6px; }
.unscheduled-empty {
  text-align: center;
  padding: 20px;
  color: var(--text3);
  font-size: 13px;
}
.unscheduled-count {
  font-size: 11px;
  color: var(--text3);
  margin-right: auto;
}

/* Reschedule popup */
.reschedule-popup {
  position: absolute;
  left: 0;
  top: 100%;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  padding: 6px;
  display: none;
  min-width: 140px;
}
.reschedule-popup.open { display: block; }
.reschedule-option {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: none;
  background: transparent;
  width: 100%;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius-xs);
  color: var(--text);
  transition: var(--transition);
}
.reschedule-option:hover {
  background: var(--surface-hover);
  color: var(--primary);
}

/* Duration display */
.duration-display {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
}
.duration-display.hours-minutes {
  color: var(--text2);
}

/* Form textarea */
.form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
  resize: vertical;
  min-height: 60px;
}
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

/* ===== BATCH BAR ===== */
.batch-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--card-border);
  padding: 12px 16px;
  display: none;
  align-items: center;
  gap: 10px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  z-index: 1000;
  animation: slideUp 0.2s ease;
  justify-content: center;
  flex-wrap: wrap;
}
.batch-bar.active { display: flex; }
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.batch-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  padding: 0 8px;
  white-space: nowrap;
}
.batch-btn {
  padding: 8px 14px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text);
}
.batch-btn:hover {
  background: var(--surface-hover);
  border-color: var(--primary);
  color: var(--primary);
}
.batch-btn.danger:hover {
  background: var(--danger-light);
  border-color: var(--danger);
  color: var(--danger);
}
.batch-shift-input {
  width: 60px;
  padding: 6px 8px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xs);
  font-family: inherit;
  font-size: 13px;
  text-align: center;
  direction: ltr;
}
.batch-shift-input:focus {
  outline: none;
  border-color: var(--primary);
}

/* ===== SETTINGS MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  width: 90%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 0.2s ease;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-close {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--surface-hover);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text2);
  transition: var(--transition);
}
.modal-close:hover {
  background: var(--danger-light);
  color: var(--danger);
}
.modal-body { position: relative; }

.settings-group {
  margin-bottom: 20px;
}
.settings-group h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface-hover);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.settings-row .label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.settings-row .desc {
  font-size: 12px;
  color: var(--text2);
}
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--text3);
  border-radius: 24px;
  transition: var(--transition);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  top: 3px;
  right: 3px;
  transition: var(--transition);
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--primary);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(-20px);
}

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  background: var(--text);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  animation: toastIn 0.3s ease;
  pointer-events: auto;
  box-shadow: var(--shadow-lg);
  text-align: center;
  max-width: 90vw;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--primary); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== DATE PICKER MODAL ===== */
.date-picker-modal .modal {
  max-width: 340px;
}
.date-picker-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 12px;
}
.date-picker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.date-picker-header .month-year {
  font-size: 16px;
  font-weight: 700;
}
.date-picker-nav {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text2);
  padding: 4px 8px;
  border-radius: var(--radius-xs);
  transition: var(--transition);
}
.date-picker-nav:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.date-picker-grid .day-label {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  padding: 4px 0;
}
.date-picker-grid .day-cell {
  text-align: center;
  padding: 8px 4px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  border: none;
  background: transparent;
  font-family: inherit;
  color: var(--text);
}
.date-picker-grid .day-cell:hover {
  background: var(--surface-hover);
}
.date-picker-grid .day-cell.selected {
  background: var(--primary);
  color: #fff;
}
.date-picker-grid .day-cell.other-month {
  color: var(--text3);
}
.date-picker-grid .day-cell.today-cell {
  border: 1px solid var(--primary);
}

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  flex: 1;
  padding: 8px 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn:hover { background: var(--surface-hover); color: var(--text); }
.tab-btn.active { background: var(--primary); color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== GOALS ===== */
.goals-header-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.goals-section {
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.goals-section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface-hover);
  border-bottom: 1px solid var(--card-border);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
}
.goals-section-header:hover { background: var(--primary-light); }
.goals-section-header .arrow { transition: transform 0.2s; font-size: 12px; margin-left: auto; }
.goals-section-header.open .arrow { transform: rotate(90deg); }
.goals-section-body { display: none; padding: 12px; }
.goals-section-body.open { display: block; }

.period-card {
  padding: 12px 14px;
  background: var(--surface-hover);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: var(--transition);
}
.period-card:hover { border-color: var(--primary); }
.period-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.period-card-title { font-size: 15px; font-weight: 600; flex: 1; }
.period-card-dates { font-size: 12px; color: var(--text2); }
.period-card-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.period-card-status.completed { background: var(--success-light); color: #059669; }
.period-card-status.active { background: var(--accent-light); color: #8a6d00; }
.period-card-status.in_progress { background: var(--primary-light); color: var(--primary); }
.period-card-body { display: none; padding: 8px 0 0; }
.period-card-body.open { display: block; }
.period-card-desc { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.period-actions { display: flex; gap: 4px; margin-top: 6px; }

.goal-card {
  padding: 10px 12px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  margin-right: 16px;
  transition: var(--transition);
  position: relative;
}
.goal-card:hover { border-color: var(--primary); }
.goal-card::before {
  content: '';
  position: absolute;
  right: -12px;
  top: 50%;
  width: 8px;
  height: 1px;
  background: var(--text3);
}
.goal-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.goal-card-title { font-size: 14px; font-weight: 600; flex: 1; }
.goal-card-type { font-size: 11px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }
.goal-card-dates { font-size: 11px; color: var(--text2); }
.goal-card-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.goal-card-status.completed { background: var(--success-light); color: #059669; }
.goal-card-status.active { background: var(--accent-light); color: #8a6d00; }
.goal-card-status.in_progress { background: var(--primary-light); color: var(--primary); }
.goal-card-body { display: none; padding: 8px 0 0; }
.goal-card-body.open { display: block; }
.goal-card-desc { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.goal-actions { display: flex; gap: 4px; flex-wrap: wrap; }

.objective-card {
  padding: 8px 10px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xs);
  margin-bottom: 4px;
  margin-right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
  font-size: 13px;
}
.objective-card:hover { border-color: var(--primary); background: var(--surface-hover); }
.objective-card.completed { opacity: 0.5; }
.objective-card.completed .objective-name { text-decoration: line-through; }
.objective-name { flex: 1; font-weight: 500; }
.objective-meta { font-size: 11px; color: var(--text2); }
.objective-status {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
}
.objective-status.completed { background: var(--success-light); color: #059669; }
.objective-status.in_progress { background: var(--primary-light); color: var(--primary); }
.objective-status.active { background: var(--accent-light); color: #8a6d00; }

.goals-empty {
  text-align: center;
  padding: 24px;
  color: var(--text3);
  font-size: 14px;
}
.goals-empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

/* ===== GOALS MODALS ===== */
.goal-form-group { margin-bottom: 12px; }
.goal-form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.goal-form-group input,
.goal-form-group select,
.goal-form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
}
.goal-form-group input:focus,
.goal-form-group select:focus,
.goal-form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.goal-form-group textarea { resize: vertical; min-height: 50px; }
.goal-form-row { display: flex; gap: 10px; flex-wrap: wrap; }
.goal-form-row .goal-form-group { flex: 1; min-width: 100px; }
.objectives-list-form { margin-top: 8px; }
.objective-form-item {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 6px 8px;
  background: var(--surface-hover);
  border-radius: var(--radius-xs);
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.objective-form-item input,
.objective-form-item textarea {
  flex: 1;
  min-width: 80px;
  padding: 4px 8px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xs);
  font-family: inherit;
  font-size: 12px;
}
.objective-form-item textarea { min-height: 30px; resize: vertical; }
.objective-form-item .btn-icon { width: 24px; height: 24px; font-size: 12px; flex-shrink: 0; }

/* ===== TYPE BLOCKS (rounded, colored per type) ===== */
.type-block {
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  padding: 10px 12px 6px;
  transition: var(--transition);
  position: relative;
  border: 1px solid;
}
.type-block-child {
  margin-right: 20px;
  padding: 8px 10px 4px;
}
.type-block-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid;
}
.type-block-name {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.type-block-count {
  font-size: 11px;
  font-weight: 500;
  opacity: 0.6;
}

/* ===== TYPE TAGS HIERARCHY ===== */
.type-children { display: flex; gap: 6px; flex-wrap: wrap; margin-right: 12px; }
.type-children.hidden { display: none; }
.type-bar-toggle { transition: transform 0.2s; display: inline-block; }
.type-bar-toggle.open { transform: rotate(90deg); }
.type-bar-children-wrap { width: 100%; }

/* ===== TYPE TAG COLORS ===== */

<script>
// ===== CONFIGURATION =====
const STORAGE_KEY = 'personalManagerData';
const DAY_NAMES = ['יום א', 'יום ב', 'יום ג', 'יום ד', 'יום ה', 'יום ו', 'שבת'];
const DAY_NAMES_SHORT = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
const MONTH_NAMES = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

// ===== STATE =====
let state = {
  results: [],
  suggestions: {},
  goalPeriods: [],
  goalTypes: [],
  goals: [],
  objectives: [],
  settings: {
    autoSync: false,
    githubToken: '',
    githubRepo: '',
    githubPath: 'data/data.json',
  }
};

let currentDate = new Date();
let weekOffset = 0;
let selectedIds = new Set();
let editingId = null;
let recurrenceType = '';
let recurrenceDays = [];
let pickerYear, pickerMonth;

// ===== INIT =====
function init() {
  loadState();
  renderWeek();
  renderDay();
  const token = getGithubToken();
  const sha = getSha();
  if (token && sha) {
    setSyncStatus('synced', 'נשמר בענן');
    // background-verify SHA freshness (silent)
    fetch(`https://api.github.com/repos/${getGithubRepo()}/contents/${getGithubPath()}?ref=master`, {
      headers: { 'Authorization': `Bearer ${token}` }
    }).then(r => r.json()).then(d => {
      if (d.sha && d.sha !== sha) setSha(d.sha);
    }).catch(() => {});
  } else if (token) {
    setSyncStatus('', 'מקומי');
  } else {
    setSyncStatus('', 'מקומי');
  }
}

// ===== STATE PERSISTENCE =====
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.results = data.results || [];
      state.suggestions = data.suggestions || {};
      state.goalPeriods = data.goalPeriods || [];
      state.goalTypes = data.goalTypes || [];
      state.goals = data.goals || [];
      state.objectives = data.objectives || [];
      if (data.settings) Object.assign(state.settings, data.settings);
    }
  } catch(e) { console.warn('Error loading state:', e); }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Error saving state:', e); }
  debouncedSync();
}

// ===== GITHUB SYNC =====
let syncTimer = null;
let isSyncing = false;

function getGithubToken() {
  return state.settings.githubToken || localStorage.getItem('personalManagerGithubToken') || '';
}

function setGithubToken(token) {
  state.settings.githubToken = token;
  localStorage.setItem('personalManagerGithubToken', token);
  saveState();
}

function getGithubRepo() {
  return state.settings.githubRepo || localStorage.getItem('personalManagerGithubRepo') || 'basadfree/personal-management';
}

function setGithubRepo(repo) {
  state.settings.githubRepo = repo;
  localStorage.setItem('personalManagerGithubRepo', repo);
  saveState();
}

function getGithubPath() {
  return state.settings.githubPath || localStorage.getItem('personalManagerGithubPath') || 'data/data.json';
}

function setGithubPath(path) {
  state.settings.githubPath = path;
  localStorage.setItem('personalManagerGithubPath', path);
  saveState();
}

function getSha() {
  return localStorage.getItem('personalManagerGithubFileSha') || '';
}

function setSha(sha) {
  if (sha) localStorage.setItem('personalManagerGithubFileSha', sha);
  else localStorage.removeItem('personalManagerGithubFileSha');
}

function buildBackupJson() {
  return JSON.stringify({
    version: 1,
    exportedAt: new Date().toISOString(),
    results: state.results,
    suggestions: state.suggestions,
    goalPeriods: state.goalPeriods,
    goalTypes: state.goalTypes,
    goals: state.goals,
    objectives: state.objectives,
    settings: {
      autoSync: state.settings.autoSync
    }
  }, null, 2);
}

async function syncToGitHub(showToast = true) {
  if (isSyncing) { console.warn('sync: already in progress, skipping'); return false; }
  const token = getGithubToken();
  const repo = getGithubRepo();
  const path = getGithubPath();
  const parts = repo.split('/');
  if (parts.length !== 2 || !parts[0] || !parts[1]) {
    if (showToast) toast('❌ פורמט מאגר לא תקין. השתמש: בעל-אתר/שם-המאגר', 'error');
    setSyncStatus('error', 'שגיאה');
    return false;
  }
  const [owner, repoName] = parts;

  if (!token) {
    if (showToast) toast('❌ לא הוגדר טוקן גיטאב. הגדר בהגדרות.', 'error');
    setSyncStatus('', 'מקומי');
    return false;
  }
  setSyncStatus('syncing', 'שומר…');
  if (showToast) toast('☁️ מסנכרן לענן...', 'info');
  isSyncing = true;

  const content = btoa(unescape(encodeURIComponent(buildBackupJson())));
  const baseUrl = `https://api.github.com/repos/${owner}/${repoName}/contents/${path}`;
  const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

  async function fetchSha() {
    const r = await fetch(baseUrl + '?ref=master&_=' + Date.now(), { method: 'GET', headers, cache: 'no-store' });
    if (r.ok) { const d = await r.json(); return d.sha; }
    return null;
  }

  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const sha = await fetchSha();
      const body = { message: 'גיבוי אוטומטי ' + new Date().toLocaleString('he-IL'), content, branch: 'master' };
      if (sha) body.sha = sha;
      const res = await fetch(baseUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
      const data = await res.json();

      if (res.ok) {
        if (data.content?.sha) setSha(data.content.sha);
        if (showToast) toast('✅ הנתונים סונכרנו לענן!', 'success');
        document.getElementById('syncStatus').textContent = 'מסונכרן: ' + new Date().toLocaleString('he-IL');
        setSyncStatus('synced', 'נשמר בענן'); isSyncing = false; return true;
      }

      console.error('sync: GitHub API error', res.status, data);
      if (res.status === 409 && attempt < 2) { await new Promise(r => setTimeout(r, 300)); continue; }

      if (res.status === 403 && data.message?.includes('rate limit')) toast('❌ חריגת קצב GitHub API. נסה שוב בעוד דקה.', 'error');
      else if (res.status === 401) toast('❌ טוקן GitHub לא תקין. עדכן בהגדרות.', 'error');
      else if (res.status === 404) toast('❌ הנתיב/מאגר לא נמצא ב-GitHub. בדוק הגדרות.', 'error');
      else toast(`❌ שגיאת סנכרון (${res.status}): ${data.message || 'לא ידוע'}`, 'error');
      setSyncStatus('error', 'שגיאה'); setSha(''); isSyncing = false; return false;
    } catch (e) {
      console.error('sync: fetch exception', e);
      if (attempt < 2) { await new Promise(r => setTimeout(r, 300)); continue; }
      toast(`❌ שגיאת סנכרון: ${e.message}`, 'error');
      setSyncStatus('error', 'שגיאה'); setSha(''); isSyncing = false; return false;
    }
  }
}

function debouncedSync() {
  if (!state.settings.autoSync) return;
  const token = getGithubToken();
  if (!token) return;
  if (isSyncing) return; // don't stack syncs
  setSyncStatus('syncing', 'שומר…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    await syncToGitHub(false);
  }, 2000);
}

function toggleAutoSync(enabled) {
  state.settings.autoSync = enabled;
  saveState();
}

function setSyncStatus(status, text) {
  const el = document.getElementById('syncStatusIndicator');
  const textEl = document.getElementById('syncStatusText');
  el.className = 'sync-status';
  if (status) el.classList.add(status);
  if (text) textEl.textContent = text;
}

// ===== DATE HELPERS =====
function getDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatDateDisplay(dateStr) {
  const d = parseDate(dateStr);
  const today = getDateStr(new Date());
  const yesterday = getDateStr(new Date(Date.now() - 86400000));
  const tomorrow = getDateStr(new Date(Date.now() + 86400000));

  if (dateStr === today) return 'היום';
  if (dateStr === yesterday) return 'אתמול';
  if (dateStr === tomorrow) return 'מחר';

  return DAY_NAMES[d.getDay()] + ', ' + d.getDate() + ' ב' + MONTH_NAMES[d.getMonth()];
}

function isSameDay(a, b) {
  return getDateStr(a) === getDateStr(b);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function getStartOfWeek(d) {
  const r = new Date(d);
  const day = r.getDay(); // 0=Sun
  r.setDate(r.getDate() - day);
  return r;
}

// ===== WEEK NAVIGATION =====
function renderWeek() {
  const container = document.getElementById('weekDays');
  const today = new Date();
  const start = getStartOfWeek(addDays(new Date(), weekOffset * 7));
  const selectedStr = getDateStr(currentDate);

  container.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const day = addDays(start, i);
    const dayStr = getDateStr(day);
    const isToday = isSameDay(day, today);
    const isActive = dayStr === selectedStr;
    const count = state.results.filter(r => r.date === dayStr && !r.archived && !r.completed).length;

    const btn = document.createElement('button');
    btn.className = 'week-day' + (isActive ? ' active' : '') + (isToday ? ' today' : '');
    btn.innerHTML = `
      <span class="day-name">${DAY_NAMES_SHORT[i]}</span>
      <span class="day-num">${day.getDate()}</span>
      ${count > 0 ? `<span class="day-count">${count}</span>` : ''}
    `;
    btn.onclick = () => { currentDate = day; selectedIds.clear(); renderWeek(); renderDay(); updateBatchBar(); };
    container.appendChild(btn);
  }

  updateDateHeader();
}

function moveWeek(dir) {
  weekOffset += dir;
  renderWeek();
}

function goToToday() {
  currentDate = new Date();
  weekOffset = 0;
  selectedIds.clear();
  renderWeek();
  renderDay();
  updateBatchBar();
}

function updateDateHeader() {
  const d = currentDate;
  const dateStr = getDateStr(d);
  document.getElementById('dateTitle').textContent = formatDateDisplay(dateStr);
  document.getElementById('dateSubtitle').textContent = d.getDate() + ' ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
}

// ===== SUGGESTIONS =====
function getSuggestionsForDate(dateStr) {
  const suggestions = [];
  const todaySuggestions = state.suggestions[dateStr] || {};

  for (const result of state.results) {
    if (!result.recurrence) continue;
    if (result.archived) continue;
    if (result.date === dateStr) continue; // already on this date
    if (result.sourceDate === dateStr) continue; // same as source

    // Check if we already handled this suggestion today
    const sugState = todaySuggestions[result.id];
    if (sugState === 'accepted') continue;
    if (sugState === 'dismissed') continue;
    if (sugState === 'deleted') continue;

    // Check if task appears on this date
    if (shouldAppearOnDate(result, dateStr)) {
      suggestions.push(result);
    }
  }

  return suggestions;
}

function recurrenceDayMatch(result, dateStr) {
  if (!result.recurrence) return true;
  const date = parseDate(dateStr);
  const dayOfWeek = date.getDay();
  const dayOfMonth = date.getDate();
  switch (result.recurrence.type) {
    case 'daily': return true;
    case 'weekly': return dayOfWeek === parseDate(result.date).getDay();
    case 'weekdays': return dayOfWeek >= 0 && dayOfWeek <= 4;
    case 'monthly': return dayOfMonth === parseDate(result.date).getDate();
    case 'specific': return result.recurrence.days && result.recurrence.days.includes(dayOfWeek);
    default: return true;
  }
}

function shouldAppearOnDate(result, dateStr) {
  const date = parseDate(dateStr);
  const sourceDate = parseDate(result.date);
  const dayOfWeek = date.getDay();
  const dayOfMonth = date.getDate();

  // Don't suggest before the source date
  if (date < sourceDate) return false;

  switch (result.recurrence.type) {
    case 'daily':
      return true;
    case 'weekly':
      // Same day of week
      return dayOfWeek === sourceDate.getDay();
    case 'weekdays':
      return dayOfWeek >= 0 && dayOfWeek <= 4;
    case 'monthly':
      return dayOfMonth === sourceDate.getDate();
    case 'specific':
      return result.recurrence.days && result.recurrence.days.includes(dayOfWeek);
    default:
      return false;
  }
}

function renderSuggestions() {
  const dateStr = getDateStr(currentDate);
  const suggestions = getSuggestionsForDate(dateStr);
  const bar = document.getElementById('suggestionsBar');
  const list = document.getElementById('suggestionsList');

  if (suggestions.length === 0) {
    bar.classList.remove('has-suggestions');
    return;
  }

  bar.classList.add('has-suggestions');
  list.innerHTML = suggestions.map(r => {
    const timeDisplay = r.time ? r.time.slice(0, 5) : '';
    const durationDisplay = r.duration ? ` (${r.duration} דק')` : '';
    const recurringLabel = getRecurrenceLabel(r.recurrence);
    return `
      <div class="suggestion-item" data-id="${r.id}">
        <div class="suggestion-info">
          <div class="suggestion-title">${escHtml(r.title)}</div>
          <div class="suggestion-meta">${timeDisplay ? '⏰ ' + timeDisplay : ''}${durationDisplay} 🔄 ${recurringLabel}</div>
        </div>
        <div class="suggestion-actions">
          <button class="suggestion-btn accept" onclick="acceptSuggestion('${r.id}')">✅ הוסף להיום</button>
          <button class="suggestion-btn postpone" onclick="postponeSuggestion('${r.id}')">⏳ דחה</button>
          <button class="suggestion-btn dismiss" onclick="dismissSuggestion('${r.id}')">🙈 דלג</button>
          <button class="suggestion-btn delete" onclick="deleteSourceTask('${r.id}')">🗑️ מחק</button>
        </div>
      </div>
    `;
  }).join('');
}

function acceptSuggestion(resultId) {
  const dateStr = getDateStr(currentDate);
  const source = state.results.find(r => r.id === resultId);
  if (!source) return;

  // Add a copy to today
  const newResult = {
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    title: source.title,
    description: source.description || '',
    time: source.time,
    duration: source.duration,
    date: dateStr,
    completed: false,
    archived: false,
    recurrence: null,
    sourceId: source.id,
    createdAt: new Date().toISOString()
  };
  state.results.push(newResult);

  // Record suggestion as accepted
  if (!state.suggestions[dateStr]) state.suggestions[dateStr] = {};
  state.suggestions[dateStr][resultId] = 'accepted';
  saveState();

  renderDay();
  renderSuggestions();
  toast('✅ התוצאה נוספה להיום!', 'success');
}

function postponeSuggestion(resultId) {
  const dateStr = getDateStr(currentDate);
  if (!state.suggestions[dateStr]) state.suggestions[dateStr] = {};
  state.suggestions[dateStr][resultId] = 'postponed';
  saveState();
  renderSuggestions();
  toast('⏳ התוצאה תוצג מחר שוב', 'info');
}

function dismissSuggestion(resultId) {
  const dateStr = getDateStr(currentDate);
  if (!state.suggestions[dateStr]) state.suggestions[dateStr] = {};
  state.suggestions[dateStr][resultId] = 'dismissed';
  saveState();
  renderSuggestions();
  toast('🙈 דולג להיום', 'info');
}

function deleteSourceTask(resultId) {
  if (!confirm('למחוק את התוצאה הזאת לצמיתות?')) return;
  state.results = state.results.filter(r => r.id !== resultId);

  // Clean up suggestions for all dates
  for (const date in state.suggestions) {
    delete state.suggestions[date][resultId];
  }

  const dateStr = getDateStr(currentDate);
  if (!state.suggestions[dateStr]) state.suggestions[dateStr] = {};
  state.suggestions[dateStr][resultId] = 'deleted';

  saveState();
  renderDay();
  renderSuggestions();
  toast('🗑️ התוצאה נמחקה', 'info');
}

function getRecurrenceLabel(rec) {
  if (!rec) return '';
  switch (rec.type) {
    case 'daily': return 'יומי';
    case 'weekly': return 'שבועי';
    case 'weekdays': return 'ימי חול';
    case 'monthly': return 'חודשי';
    case 'specific': return (rec.days || []).map(d => DAY_NAMES_SHORT[d]).join(', ');
    default: return '';
  }
}

    el.classList.add('active');
  }
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) {
    toast('❌ נא להזין כותרת לתוצאה', 'error');
    return;
  }

  const description = document.getElementById('taskDescription').value.trim();
  const noDate = document.getElementById('taskNoDate').checked;
  const time = noDate ? '' : (document.getElementById('taskTime').value || '09:00');
  const hours = parseInt(document.getElementById('taskDurationHours').value) || 0;
  const minutes = parseInt(document.getElementById('taskDurationMinutes').value) || 0;
  const duration = hours * 60 + minutes;
  const dateInput = document.getElementById('taskDate').value;
  const dateStr = noDate ? '' : (dateInput || getDateStr(currentDate));

  let recurrence = null;
  if (recurrenceType) {
    if (recurrenceType === 'specific' && recurrenceDays.length === 0) {
      toast('❌ בחר ימים לחזרה', 'error');
      return;
    }
    recurrence = { type: recurrenceType };
    if (recurrenceType === 'specific') {
      recurrence.days = recurrenceDays.slice();
    }
  }

  if (editingId) {
    const idx = state.results.findIndex(r => r.id === editingId);
    if (idx >= 0) {
      state.results[idx].title = title;
      state.results[idx].description = description;
      state.results[idx].time = time;
      state.results[idx].duration = duration;
      state.results[idx].date = dateStr;
      state.results[idx].recurrence = recurrence;
    }
    editingId = null;
    toast('✅ התוצאה עודכנה', 'success');
  } else {
    const result = {
      id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      title,
      description,
      time,
      duration,
      date: dateStr,
      completed: false,
      archived: false,
      recurrence,
      sourceId: null,
      createdAt: new Date().toISOString()
    };
    state.results.push(result);
    toast('✅ התוצאה נוספה!', 'success');
  }

  saveState();
  resetForm();
  toggleTaskForm();
  renderWeek();
  renderDay();
  renderUnscheduledTasks();
}

  const result = state.results.find(r => r.id === id);
  if (result) {
    result.completed = !result.completed;
    saveState();
    renderDay();

let expandedId = null;

function toggleExpand(id) {

    document.querySelectorAll('.task-card.expanded').forEach(c => c.classList.remove('expanded'));
    expandedId = null;

  }

function startEdit(id) {
  const result = state.results.find(r => r.id === id);
  if (!result) return;

  editingId = id;
  document.getElementById('taskTitle').value = result.title;
  document.getElementById('taskDescription').value = result.description || '';
  const noDate = !result.date || result.date === '';
  document.getElementById('taskNoDate').checked = noDate;
  document.getElementById('taskDate').value = noDate ? getDateStr(new Date()) : (result.date || getDateStr(new Date()));
  document.getElementById('taskDate').disabled = noDate;
  document.getElementById('taskTime').value = noDate ? '09:00' : (result.time || '09:00');
  document.getElementById('taskTime').disabled = noDate;
  const dur = result.duration || 0;
  document.getElementById('taskDurationHours').value = Math.floor(dur / 60);
  document.getElementById('taskDurationMinutes').value = dur % 60;

  // Set recurrence
  recurrenceType = result.recurrence ? result.recurrence.type : '';
  recurrenceDays = result.recurrence && result.recurrence.days ? result.recurrence.days.slice() : [];
  document.querySelectorAll('.recurrence-option').forEach(b => {
    b.classList.toggle('active', b.dataset.value === recurrenceType);
  });

  if (recurrenceType === 'specific') {
    document.getElementById('daysPicker').style.display = 'flex';
    document.querySelectorAll('.day-pick').forEach(b => {
      b.classList.toggle('active', recurrenceDays.includes(parseInt(b.dataset.day)));
    });
  } else {
    document.getElementById('daysPicker').style.display = 'none';
  }

  const form = document.getElementById('addTaskForm');
  form.classList.add('open');
  document.getElementById('addTaskToggle').style.display = 'none';
}

// ===== RENDER DAY =====
function renderDay() {
  const dateStr = getDateStr(currentDate);
  const results = state.results
    .filter(r => r.date === dateStr && !r.archived && recurrenceDayMatch(r, dateStr))
    .sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));

  const container = document.getElementById('taskList');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="task-list-empty">
        <div class="empty-icon">📋</div>
        <div>אין תוצאות להיום<br><span style="font-size:13px;color:var(--text3)">לחץ על "הוסף תוצאה חדשה" כדי להתחיל</span></div>
      </div>
    `;
  } else {
    container.innerHTML = results.map(r => {
      const isSelected = selectedIds.has(r.id);
      const timeDisplay = r.time ? r.time.slice(0, 5) : '--:--';
      const dur = r.duration || 0;
      const durClass = dur <= 15 ? 'duration-xs' : dur <= 30 ? 'duration-sm' : dur <= 60 ? 'duration-md' : 'duration-lg';
      const recurringBadge = r.recurrence ? `<span class="task-tag recurring">🔄 ${getRecurrenceLabel(r.recurrence)}</span>` : '';
      const suggestionBadge = r.sourceId ? `<span class="task-tag">💡 הוצע</span>` : '';
      const descHtml = r.description ? `<div class="task-desc">${escHtml(r.description)}</div>` : '';
      const durationLabel = formatDuration(r.duration);
      return `
        <div class="task-card ${durClass} ${r.completed ? 'completed' : ''} ${isSelected ? 'selected' : ''}" data-id="${r.id}">
          <div class="task-select">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${r.id}')" onclick="event.stopPropagation()">
          </div>
          <div class="task-time">

            ${durationLabel ? `<span class="task-time-duration">${durationLabel}</span>` : ''}
          </div>

            <div class="task-title">${escHtml(r.title)}</div>
            ${descHtml}

              ${suggestionBadge}
            </div>
          </div>
          <div class="task-complete">
            <button class="task-complete-btn ${r.completed ? 'done' : ''}" onclick="toggleComplete('${r.id}')" title="${r.completed ? 'סמן כטרם בוצע' : 'סמן כבוצע'}">
              ${r.completed ? '✓' : ''}
            </button>

          <div class="task-edit">
            <button class="task-edit-btn" onclick="event.stopPropagation();editTask('${r.id}')" title="ערוך תוצאה">✏️</button>

  }

  renderSuggestions();

// ===== BATCH OPERATIONS =====
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderDay();
}

function updateBatchBar() {
  const bar = document.getElementById('batchBar');
  const count = document.getElementById('batchCount');
  const selected = selectedIds.size;

  if (selected > 0) {
    bar.classList.add('active');
    count.textContent = `נבחרו ${selected}`;
  } else {
    bar.classList.remove('active');
  }
}

function getSelectedResults() {
  return state.results.filter(r => selectedIds.has(r.id));
}

function batchDelete() {
  if (selectedIds.size === 0) return;
  if (!confirm(`למחוק ${selectedIds.size} תוצאות?`)) return;

  state.results = state.results.filter(r => !selectedIds.has(r.id));
  selectedIds.clear();
  saveState();
  renderWeek();
  renderDay();
  toast(`🗑️ ${selectedIds.size} תוצאות נמחקו`, 'info');
}

function batchDuplicate() {
  if (selectedIds.size === 0) return;
  const dateStr = getDateStr(currentDate);
  const toDuplicate = getSelectedResults();

  for (const r of toDuplicate) {
    const newResult = {
      id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      title: r.title + ' (עותק)',
      description: r.description || '',
      time: r.time,
      duration: r.duration,
      date: dateStr,
      completed: false,
      archived: false,
      recurrence: null,
      sourceId: null,
      createdAt: new Date().toISOString()
    };
    state.results.push(newResult);
  }

  selectedIds.clear();
  saveState();
  renderDay();
  toast(`📋 ${toDuplicate.length} תוצאות שוכפלו`, 'success');
}

function batchMoveDate() {
  if (selectedIds.size === 0) return;
  showDatePickerForMove();
}

let movePending = false;

function showDatePickerForMove() {
  movePending = true;
  showDatePicker();
}

function handleDatePickForMove(dateStr) {
  if (!movePending) return;
  movePending = false;

  const toMove = getSelectedResults();
  for (const r of toMove) {
    r.date = dateStr;
  }

  selectedIds.clear();
  saveState();
  renderWeek();
  renderDay();
  toast(`📅 ${toMove.length} תוצאות הועברו ל־${formatDateDisplay(dateStr)}`, 'success');
}

function batchShiftTime() {
  if (selectedIds.size === 0) return;
  const minutes = parseInt(document.getElementById('shiftMinutes').value) || 30;
  const toShift = getSelectedResults();

  for (const r of toShift) {
    if (r.time) {
      const [h, m] = r.time.split(':').map(Number);
      const total = h * 60 + m + minutes;
      const newH = ((total % 1440) / 60) | 0;
      const newM = total % 60;
      r.time = String(newH).padStart(2, '0') + ':' + String(newM).padStart(2, '0');
    }
  }

  selectedIds.clear();
  saveState();
  renderDay();
  toast(`⏰ ${toShift.length} תוצאות נדחו ב־${minutes} דקות`, 'success');
}

// ===== RESCHEDULE =====
let rescheduleOpenId = null;

function toggleReschedule(id) {
  if (rescheduleOpenId === id) {
    document.getElementById('reschedule_' + id).classList.remove('open');
    rescheduleOpenId = null;
    return;
  }
  document.querySelectorAll('.reschedule-popup').forEach(p => p.classList.remove('open'));
  document.getElementById('reschedule_' + id).classList.add('open');
  rescheduleOpenId = id;
}

function scheduleForDate(id, when) {
  document.querySelectorAll('.reschedule-popup').forEach(p => p.classList.remove('open'));
  rescheduleOpenId = null;
  const result = state.results.find(r => r.id === id);
  if (!result) return;

  if (when === 'tomorrow') {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const newDateStr = getDateStr(tomorrow);
    const newResult = {
      id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      title: result.title,
      description: result.description,
      time: result.time,
      duration: result.duration,
      date: newDateStr,
      completed: false,
      archived: false,
      recurrence: null,
      sourceId: result.sourceId || result.id,
      createdAt: new Date().toISOString()
    };
    state.results.push(newResult);
    saveState();
    renderDay();
    toast(`📅 התוצאה תוזמנה למחר (${formatDateDisplay(newDateStr)})`, 'success');
  } else if (when === 'picker') {
    movePending = true;
    pendingRescheduleSourceId = id;
    showDatePicker();
  }
}

let pendingRescheduleSourceId = null;

// ===== UNSCHEDULED TASKS =====
let unscheduledOpen = false;

function toggleUnscheduled() {
  unscheduledOpen = !unscheduledOpen;
  document.getElementById('unscheduledBody').classList.toggle('open', unscheduledOpen);
  document.getElementById('unscheduledToggle').classList.toggle('open', unscheduledOpen);
  if (unscheduledOpen) renderUnscheduledTasks();
}

function renderUnscheduledTasks() {
  const results = state.results.filter(r => (!r.date || r.date === '') && !r.archived);
  const section = document.getElementById('unscheduledSection');
  const container = document.getElementById('unscheduledList');
  const countEl = document.getElementById('unscheduledCount');
  countEl.textContent = results.length;

  if (results.length === 0) {
    section.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  section.style.display = 'block';
  if (!unscheduledOpen) {
    unscheduledOpen = true;
    document.getElementById('unscheduledBody').classList.add('open');
    document.getElementById('unscheduledToggle').classList.add('open');
  }

  container.innerHTML = results.map(r => {
    const isSelected = selectedIds.has(r.id);
    const dur = r.duration || 0;
    const durClass = dur <= 15 ? 'duration-xs' : dur <= 30 ? 'duration-sm' : dur <= 60 ? 'duration-md' : 'duration-lg';
    const descHtml = r.description ? `<div class="task-desc">${escHtml(r.description)}</div>` : '';
    const durationLabel = formatDuration(r.duration);
    return `
      <div class="task-card ${durClass} ${isSelected ? 'selected' : ''}" data-id="${r.id}" style="position:relative">
        <div class="task-select">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${r.id}')" onclick="event.stopPropagation()">
        </div>
        <div class="task-time">
          <span class="task-time-main">--:--</span>
          ${durationLabel ? `<span class="task-time-duration">${durationLabel}</span>` : ''}
        </div>
        <div class="task-body" onclick="showUnscheduledMenu('${r.id}')">
          <div class="task-title">${escHtml(r.title)}</div>
          ${descHtml}
        </div>
        <div class="reschedule-popup" id="unschedMenu_${r.id}">
          <button class="reschedule-option" onclick="closeUnscheduledMenu();startEdit('${r.id}')">✏️ עריכה</button>
          <button class="reschedule-option" onclick="assignUnscheduledDate('${r.id}')">📅 בחירת תאריך ושעה</button>
        </div>
      </div>
    `;
  }).join('');
}

function showUnscheduledMenu(id) {
  document.querySelectorAll('.reschedule-popup').forEach(p => p.classList.remove('open'));
  document.getElementById('unschedMenu_' + id).classList.add('open');
}

function closeUnscheduledMenu() {
  document.querySelectorAll('.reschedule-popup').forEach(p => p.classList.remove('open'));

}

document.addEventListener('click', (e) => {

function exportData() {
  const json = buildBackupJson();
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `personal-manager-backup-${getDateStr(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 נתונים יוצאו', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.results) {
        state.results = data.results;
        if (data.suggestions) state.suggestions = data.suggestions;
        saveState();
        renderWeek();
        renderDay();
        toast('📥 נתונים יובאו בהצלחה!', 'success');
      } else {
        toast('❌ פורמט קובץ לא תקין', 'error');
      }
    } catch(err) {
      toast('❌ שגיאה בייבוא הקובץ', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== DATE PICKER =====
function showDatePicker() {
  const modal = document.getElementById('datePickerModal');
  modal.classList.add('open');
  const d = currentDate;
  pickerYear = d.getFullYear();
  pickerMonth = d.getMonth();
  renderDatePicker();
  const timeRow = document.getElementById('pickerTimeRow');
  if (pendingRescheduleSourceId) {
    timeRow.style.display = 'block';
    document.getElementById('pickerTimeInput').value = '09:00';
  } else {
    timeRow.style.display = 'none';
  }
}

function closeDatePicker() {
  document.getElementById('datePickerModal').classList.remove('open');
  document.getElementById('pickerTimeRow').style.display = 'none';
  movePending = false;
  pendingRescheduleSourceId = null;
}

function confirmPickerWithTime() {
  const time = document.getElementById('pickerTimeInput').value;
  if (!time) {
    toast('❌ נא להזין שעה', 'error');
    return;
  }
  const dayCells = document.querySelectorAll('.day-cell.selected');
  if (dayCells.length === 0) {
    toast('❌ נא לבחור תאריך בלוח', 'error');
    return;
  }
  const selectedDate = new Date(pickerYear, pickerMonth, parseInt(dayCells[0].textContent));
  const fullDateStr = getDateStr(selectedDate);

  if (pendingRescheduleSourceId) {
    const source = state.results.find(r => r.id === pendingRescheduleSourceId);
    if (source) {
      if (!source.date || source.date === '') {
        // Unscheduled → update source
        source.date = fullDateStr;
        source.time = time;
        toast(`📅 התוצאה שובצה ל־${formatDateDisplay(fullDateStr)} ב־${time}`, 'success');
      } else {
        // Reschedule → create a copy
        const newResult = {
          id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          title: source.title,
          description: source.description || '',
          time: time,
          duration: source.duration,
          date: fullDateStr,
          completed: false,
          archived: false,
          recurrence: null,
          sourceId: source.sourceId || source.id,
          createdAt: new Date().toISOString()
        };
        state.results.push(newResult);
        toast(`📅 התוצאה תוזמנה ל־${formatDateDisplay(fullDateStr)} ב־${time}`, 'success');
      }
      saveState();
      renderDay();
    }
    pendingRescheduleSourceId = null;
    movePending = false;
    closeDatePicker();
    return;
  }
  closeDatePicker();
}

function renderDatePicker() {
  document.getElementById('pickerMonthYear').textContent = MONTH_NAMES[pickerMonth] + ' ' + pickerYear;
  const grid = document.getElementById('datePickerGrid');
  const firstDay = new Date(pickerYear, pickerMonth, 1).getDay();
  const daysInMonth = new Date(pickerYear, pickerMonth + 1, 0).getDate();
  const todayStr = getDateStr(new Date());
  const selectedStr = getDateStr(currentDate);

  let html = '';
  const labels = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
  labels.forEach(l => { html += `<div class="day-label">${l}</div>`; });

  for (let i = 0; i < firstDay; i++) {
    html += '<div></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(pickerYear, pickerMonth, d);
    const dateStr = getDateStr(date);
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedStr;
    html += `
      <button class="day-cell ${isSelected ? 'selected' : ''} ${isToday ? 'today-cell' : ''}" onclick="pickDate('${dateStr}')">
        ${d}
      </button>
    `;
  }

  grid.innerHTML = html;
}

function navigatePickerMonth(dir) {
  pickerMonth += dir;
  if (pickerMonth > 11) { pickerMonth = 0; pickerYear++; }
  if (pickerMonth < 0) { pickerMonth = 11; pickerYear--; }
  renderDatePicker();
}

function pickDate(dateStr) {
  // If picking a date while time picker is shown, highlight the cell
  if (document.getElementById('pickerTimeRow').style.display === 'block') {
    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
    const cell = document.querySelector(`.day-cell[onclick="pickDate('${dateStr}')"]`);
    if (cell) cell.classList.add('selected');
    return;
  }
  if (movePending) {
    handleDatePickForMove(dateStr);
    closeDatePicker();
    return;
  }

  currentDate = parseDate(dateStr);
  weekOffset = 0;
  selectedIds.clear();
  closeDatePicker();
  renderWeek();
  renderDay();
  updateBatchBar();
}

// ===== TOAST =====
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ===== UTILITY =====
function formatDuration(minutes) {
  if (!minutes || minutes <= 0) return '';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (h > 0 && m > 0) return `${h}ש ${m}דק`;
  if (h > 0) return `${h}שה`;
  return `${m}דק`;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Goal Type CRUD ----
function showGoalTypeForm(editId) {
  const modal = document.getElementById('goalTypeModal');
  modal.classList.add('open');

  // populate parent selector
  const parentSelect = document.getElementById('gtParentId');
  const others = editId ? state.goalTypes.filter(t => t.id !== editId) : state.goalTypes;
  parentSelect.innerHTML = '<option value="">ללא (סוג ראשי)</option>' +
    buildTypeOptions(others, '', 0);

  if (editId) {
    const t = state.goalTypes.find(x => x.id === editId);
    if (!t) return;
    document.getElementById('goalTypeModalTitle').textContent = '✏️ עריכת סוג מטרה';
    document.getElementById('gtName').value = t.name || '';
    document.getElementById('gtColor').value = t.color || '#6c63ff';
    document.getElementById('gtParentId').value = t.parentId || '';
    modal.dataset.editId = editId;
  } else {
    document.getElementById('goalTypeModalTitle').textContent = '➕ סוג מטרה חדש';
    document.getElementById('gtName').value = '';
    document.getElementById('gtColor').value = '#6c63ff';
    document.getElementById('gtParentId').value = '';
    delete modal.dataset.editId;
  }
}

function buildTypeOptions(types, prefix = '', depth = 0) {
  const roots = types.filter(t => !t.parentId);
  let html = '';
  function addChildren(parentId, depth) {
    types.filter(t => t.parentId === parentId).forEach(child => {
      const indent = '　'.repeat(depth + 1);
      html += `<option value="${child.id}">${indent}${escHtml(child.name)}</option>`;
      addChildren(child.id, depth + 1);
    });
  }
  roots.forEach(r => {
    html += `<option value="${r.id}">${escHtml(r.name)}</option>`;
    addChildren(r.id, 0);
  });
  return html;
}

function closeGoalTypeForm() {
  document.getElementById('goalTypeModal').classList.remove('open');
  delete document.getElementById('goalTypeModal').dataset.editId;
}

function saveGoalType() {
  const name = document.getElementById('gtName').value.trim();
  if (!name) { toast('נא להזין שם לסוג', 'error'); return; }
  const color = document.getElementById('gtColor').value;
  const parentId = document.getElementById('gtParentId').value;
  const editId = document.getElementById('goalTypeModal').dataset.editId;
  if (editId) {
    const t = state.goalTypes.find(x => x.id === editId);
    if (t) { t.name = name; t.color = color; t.parentId = parentId; }
  } else {
    state.goalTypes.push({ id: gtId(), name, color, parentId });
  }
  saveState();
  closeGoalTypeForm();
  renderGoalsView();
  toast(editId ? '✅ סוג עודכן' : '✅ סוג מטרה נוסף');
}

function deleteGoalType(id) {
  if (!confirm('למחוק את סוג המטרה?')) return;
  // collect all descendant ids
  const idsToRemove = new Set([id]);
  function collectChildren(parentId) {
    state.goalTypes.filter(t => t.parentId === parentId).forEach(c => {
      idsToRemove.add(c.id);
      collectChildren(c.id);
    });
  }
  collectChildren(id);
  state.goalTypes = state.goalTypes.filter(t => !idsToRemove.has(t.id));
  // remove type from goals
  state.goals.forEach(g => { if (idsToRemove.has(g.typeId)) g.typeId = ''; });
  saveState();
  renderGoalsView();
  toast('🗑️ סוג(י) מטרה נמחקו');
}
