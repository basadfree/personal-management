function closeGoalPeriodForm() {
  document.getElementById('goalPeriodModal').classList.remove('open');
  delete document.getElementById('goalPeriodModal').dataset.editId;
}

function saveGoalPeriod() {
  const name = document.getElementById('gpName').value.trim();
  if (!name) { toast('נא להזין שם לתקופה', 'error'); return; }
  const editId = document.getElementById('goalPeriodModal').dataset.editId;
  const completed = document.getElementById('gpCompleted').checked;
  const inProgress = document.getElementById('gpInProgress').checked;
  let status = 'active';
  if (completed) status = 'completed';
  else if (inProgress) status = 'in_progress';
  const data = {
    name,
    startDate: document.getElementById('gpStart').value,
    endDate: document.getElementById('gpEnd').value,
    description: document.getElementById('gpDesc').value.trim(),
    status
  };
  if (editId) {
    Object.assign(getGoalPeriod(editId), data);
  } else {
    data.id = gpId();
    state.goalPeriods.push(data);
  }
  saveState();
  closeGoalPeriodForm();
  renderGoalsView();
  toast(editId ? '✅ תקופה עודכנה' : '✅ תקופה נוספה');
}

function deleteGoalPeriod(id) {
  if (!confirm('למחוק את התקופה? גם המטרות והיעדים שבתוכה יוסרו מהתקופה.')) return;
  state.goalPeriods = state.goalPeriods.filter(p => p.id !== id);
  // unlink goals
  state.goals.forEach(g => { if (g.periodId === id) g.periodId = ''; });
  saveState();
  renderGoalsView();
  toast('🗑️ תקופה נמחקה');
}

// ---- Goal CRUD ----
function showGoalForm(editId) {
  const modal = document.getElementById('goalModal');
  modal.classList.add('open');

  // populate selects
  const periodSelect = document.getElementById('gPeriodId');
  periodSelect.innerHTML = '<option value="">ללא תקופה</option>' +
    state.goalPeriods.map(p => `<option value="${p.id}">${escHtml(p.name)}</option>`).join('');
  const typeSelect = document.getElementById('gTypeId');
  typeSelect.innerHTML = '<option value="">ללא סוג</option>' + buildTypeOptions(state.goalTypes);

  if (editId) {
    const g = getGoal(editId);
    if (!g) return;
    document.getElementById('goalModalTitle').textContent = '✏️ עריכת מטרה';
    document.getElementById('gName').value = g.name || '';
    document.getElementById('gPeriodId').value = g.periodId || '';
    document.getElementById('gTypeId').value = g.typeId || '';
    document.getElementById('gStart').value = g.startDate || '';
    document.getElementById('gEnd').value = g.endDate || '';
    document.getElementById('gDesc').value = g.description || '';
    document.getElementById('gCompleted').checked = g.status === 'completed';
    document.getElementById('gInProgress').checked = g.status === 'in_progress';
    document.getElementById('gSingle').checked = g.single || false;
    document.getElementById('gObjectivesList').style.display = g.single ? 'none' : 'block';
    modal.dataset.editId = editId;
    // load objectives
    renderGoalFormObjectives(editId);
  } else {
    document.getElementById('goalModalTitle').textContent = '🎯 מטרה חדשה';
    document.getElementById('gName').value = '';
    document.getElementById('gPeriodId').value = '';
    document.getElementById('gTypeId').value = '';
    document.getElementById('gStart').value = '';
    document.getElementById('gEnd').value = '';
    document.getElementById('gDesc').value = '';
    document.getElementById('gCompleted').checked = false;
    document.getElementById('gInProgress').checked = false;
    document.getElementById('gSingle').checked = false;
    document.getElementById('gObjectivesList').style.display = 'block';
    delete modal.dataset.editId;
    document.getElementById('gObjectivesList').innerHTML = '';
  }
}

function closeGoalForm() {
  document.getElementById('goalModal').classList.remove('open');
  delete document.getElementById('goalModal').dataset.editId;
}

function addObjectiveFormItem(obj) {
  const list = document.getElementById('gObjectivesList');
  const div = document.createElement('div');
  div.className = 'objective-form-item';
  const oid = obj ? obj.id : objId();
  div.dataset.oid = oid;
  div.innerHTML = `
    <input type="text" class="obj-name" placeholder="שם היעד" value="${obj ? escHtml(obj.name) : ''}">
    <textarea class="obj-derech" placeholder="איך? (דרך)" rows="1">${obj ? escHtml(obj.derech || '') : ''}</textarea>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap;">
      <input type="checkbox" class="obj-completed" ${obj && obj.status === 'completed' ? 'checked' : ''}>
      הושלם
    </label>
    <button class="btn-icon" onclick="removeObjectiveFormItem(this)" title="הסר">✕</button>
  `;
  list.appendChild(div);
}

function removeObjectiveFormItem(btn) {
  btn.parentElement.remove();
}

function renderGoalFormObjectives(goalId) {
  const list = document.getElementById('gObjectivesList');
  list.innerHTML = '';
  const objs = getObjectivesForGoal(goalId);
  objs.forEach(o => addObjectiveFormItem(o));
}

function collectGoalFormObjectives() {
  const items = document.querySelectorAll('#gObjectivesList .objective-form-item');
  return Array.from(items).map(div => ({
    id: div.dataset.oid,
    name: div.querySelector('.obj-name').value.trim(),
    derech: div.querySelector('.obj-derech').value.trim(),
    status: div.querySelector('.obj-completed').checked ? 'completed' : 'active'
  })).filter(o => o.name);
}

function saveGoal() {
  const name = document.getElementById('gName').value.trim();
  if (!name) { toast('נא להזין שם למטרה', 'error'); return; }
  const editId = document.getElementById('goalModal').dataset.editId;
  const completed = document.getElementById('gCompleted').checked;
  const inProgress = document.getElementById('gInProgress').checked;
  const single = document.getElementById('gSingle').checked;
  let status = 'active';
  if (completed) status = 'completed';
  else if (inProgress) status = 'in_progress';

  const data = {
    name,
    periodId: document.getElementById('gPeriodId').value,
    typeId: document.getElementById('gTypeId').value,
    startDate: document.getElementById('gStart').value,
    endDate: document.getElementById('gEnd').value,
    description: document.getElementById('gDesc').value.trim(),
    status,
    single
  };

  if (editId) {
    Object.assign(getGoal(editId), data);
    // if single mode, remove all objectives for this goal
    if (single) {
      state.objectives = state.objectives.filter(o => o.goalId !== editId);
    } else {
      // update objectives: remove deleted, update existing, add new
      const formObjs = collectGoalFormObjectives();
      const existingIds = new Set(formObjs.map(o => o.id));
      state.objectives = state.objectives.filter(o => o.goalId !== editId || existingIds.has(o.id));
      formObjs.forEach(o => {
        o.goalId = editId;
        const existing = state.objectives.find(x => x.id === o.id);
        if (existing) Object.assign(existing, o);
        else state.objectives.push(o);
      });
    }
  } else {
    data.id = goalId();
    state.goals.push(data);
    if (!single) {
      const formObjs = collectGoalFormObjectives();
      formObjs.forEach(o => {
        o.goalId = data.id;
        state.objectives.push(o);
      });
    }
  }
  saveState();
  closeGoalForm();
  renderGoalsView();
  toast(editId ? '✅ מטרה עודכנה' : '✅ מטרה נוספה');
}

function toggleGoalStatus(goalId) {
  const g = getGoal(goalId);
  if (!g) return;
  if (g.status === 'completed') g.status = 'active';
  else if (g.status === 'in_progress') g.status = 'completed';
  else g.status = 'in_progress';
  saveState();
  renderGoalsView();
}

function deleteGoal(id) {
  if (!confirm('למחוק את המטרה? גם היעדים שלה יימחקו.')) return;
  state.goals = state.goals.filter(g => g.id !== id);
  state.objectives = state.objectives.filter(o => o.goalId !== id);
  saveState();
  renderGoalsView();
  toast('🗑️ מטרה נמחקה');
}

// ---- Objective Toggle ----
function toggleObjectiveStatus(objId) {
  const o = state.objectives.find(x => x.id === objId);
  if (!o) return;
  o.status = o.status === 'completed' ? 'active' : 'completed';
  saveState();
  renderGoalsView();
}

// ---- Render Goals View (by period, then by type) ----
function renderGoalsView() {
  const container = document.getElementById('goalsContainer');

  if (state.goals.length === 0) {
    container.innerHTML = `<div class="goals-empty">
      <div class="goals-empty-icon">🎯</div>
      <div>עדיין אין מטרות ויעדים<br><span style="font-size:13px;color:var(--text3)">צור תקופת מטרות או מטרה חדשה כדי להתחיל</span></div>
    </div>`;
    return;
  }

  const periodMap = {};
  state.goalPeriods.forEach(p => { periodMap[p.id] = p; });

  // Collect types for quick lookup
  const typeMap = {};
  state.goalTypes.forEach(t => { typeMap[t.id] = t; });

  let html = '';

  // Types management bar (hierarchical, expandable)
  function renderTypeBar(parentId) {
    let html = '';
    const children = state.goalTypes.filter(t => t.parentId === parentId);
    const hasChildren = children.length > 0;
    if (!hasChildren && parentId !== '') return '';
    children.forEach(t => {
      const count = state.goals.filter(g => g.typeId === t.id).length;
      const subCount = state.goalTypes.filter(st => st.parentId === t.id).length;
      const isParent = subCount > 0;
      const toggleId = 'typetoggle_' + t.id;
      const wrapId = 'typewrap_' + t.id;
      html += `<span class="type-tag" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44;display:inline-flex;align-items:center;gap:3px;${isParent ? 'cursor:pointer;' : ''}" ${isParent ? `onclick="event.stopPropagation();document.getElementById('${wrapId}').classList.toggle('hidden');this.querySelector('.type-bar-toggle').classList.toggle('open')"` : ''}>
        ${isParent ? `<span class="type-bar-toggle">▶</span>` : ''}
        <span ${isParent ? '' : `onclick="showGoalTypeForm('${t.id}')" style="cursor:pointer;"`}>${escHtml(t.name)} (${count})</span>
        <span onclick="event.stopPropagation();showGoalTypeForm('${t.id}')" style="cursor:pointer;opacity:0.4;font-size:11px;" title="ערוך">✏️</span>
        <span onclick="event.stopPropagation();deleteGoalType('${t.id}')" style="cursor:pointer;opacity:0.4;font-size:11px;" title="מחק">✕</span>
      </span>`;
      if (isParent) {
        html += `<div id="${wrapId}" class="type-children hidden">${renderTypeBar(t.id)}</div>`;
      }
    });
    return html;
  }
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">${renderTypeBar('')}`;
  html += `<span class="type-tag" style="background:#eee;color:#666;border:1px solid #ddd;cursor:pointer;" onclick="showGoalTypeForm()">➕</span>`;
  html += `</div>`;

  // Group goals by period
  const periodGroups = {};
  const noPeriodGoals = [];
  state.goals.forEach(g => {
    if (g.periodId && periodMap[g.periodId]) {
      if (!periodGroups[g.periodId]) periodGroups[g.periodId] = [];
      periodGroups[g.periodId].push(g);
    } else {
      noPeriodGoals.push(g);
    }
  });

  // Sort periods: newest start date first
  const sortedPeriodIds = Object.keys(periodGroups).sort((a, b) => {
    const pa = periodMap[a], pb = periodMap[b];
    return (pb.startDate || '').localeCompare(pa.startDate || '');
  });

  // Render each period
  sortedPeriodIds.forEach(pid => {
    const p = periodMap[pid];
    const goals = periodGroups[pid];
    html += renderPeriodSection(p, goals, typeMap);
  });

  // Render goals without period
  if (noPeriodGoals.length > 0) {
    html += renderNoPeriodSection(noPeriodGoals, typeMap);
  }

  container.innerHTML = html;
}

function renderPeriodSection(p, goals, typeMap) {
  // Group goals within this period by type
  const typeGroups = {};
  const noTypeGoals = [];
  goals.forEach(g => {
    if (g.typeId && typeMap[g.typeId]) {
      if (!typeGroups[g.typeId]) typeGroups[g.typeId] = [];
      typeGroups[g.typeId].push(g);
    } else {
      noTypeGoals.push(g);
    }
  });

  // Find root types (no parent) and build hierarchy
  const rootTypeIds = Object.keys(typeGroups).filter(tid => !typeMap[tid].parentId)
    .sort((a, b) => (typeMap[a].name || '').localeCompare(typeMap[b].name || ''));

  const completed = p.status === 'completed';
  let html = `<div class="goals-section" style="${completed ? 'opacity:0.6;' : ''}">
    <div class="goals-section-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')">
      <span>📅 ${escHtml(p.name)}</span>
      <span class="period-card-status ${p.status}">${goalStatusLabel(p.status)}</span>
      <span class="period-actions" onclick="event.stopPropagation();">
        <button class="btn-icon" onclick="showGoalPeriodForm('${p.id}')" title="ערוך">✏️</button>
        <button class="btn-icon" onclick="deleteGoalPeriod('${p.id}')" title="מחק">🗑️</button>
      </span>
      <span class="arrow">▶</span>
    </div>
    <div class="goals-section-body open">
      ${p.description ? `<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${escHtml(p.description)}</div>` : ''}
      ${p.startDate || p.endDate ? `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">${p.startDate || '?'} → ${p.endDate || '?'}</div>` : ''}`;

  // Render root type blocks with children nested
  rootTypeIds.forEach(tid => {
    const t = { ...typeMap[tid], id: tid };
    html += renderTypeBlock(t, typeGroups, typeMap, 0);
  });

  // Render orphan child types (whose parent doesn't exist in typeGroups)
  const orphanChildIds = Object.keys(typeGroups).filter(tid =>
    typeMap[tid].parentId && !typeGroups[typeMap[tid].parentId]
  ).sort((a, b) => (typeMap[a].name || '').localeCompare(typeMap[b].name || ''));
  orphanChildIds.forEach(tid => {
    html += renderTypeBlock(typeMap[tid], typeGroups, typeMap, 0);
  });

  // Goals without type in this period
  if (noTypeGoals.length > 0) {
    html += `<div class="type-block" style="border-right:4px solid #bbb;border-color:#e0e0e0;">
      <div class="type-block-header" style="border-bottom-color:#e0e0e0;">
        <span class="type-block-name" style="color:#999;">📋 ללא סוג</span>
        <span class="type-block-count" style="color:#bbb;">${noTypeGoals.length}</span>
      </div>`;
    noTypeGoals.forEach(g => html += renderGoalCard(g, '#999'));
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderNoPeriodSection(goals, typeMap) {
  const typeGroups = {};
  const noTypeGoals = [];
  goals.forEach(g => {
    if (g.typeId && typeMap[g.typeId]) {
      if (!typeGroups[g.typeId]) typeGroups[g.typeId] = [];
      typeGroups[g.typeId].push(g);
    } else {
      noTypeGoals.push(g);
    }
  });

  const rootTypeIds = Object.keys(typeGroups).filter(tid => !typeMap[tid].parentId)
    .sort((a, b) => (typeMap[a].name || '').localeCompare(typeMap[b].name || ''));

  let html = `<div class="goals-section">
    <div class="goals-section-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')">
      <span>📥 מטרות ללא תקופה</span>
      <span class="arrow">▶</span>
    </div>
    <div class="goals-section-body open">`;

  rootTypeIds.forEach(tid => {
    html += renderTypeBlock(typeMap[tid], typeGroups, typeMap, 0);
  });

  const orphanChildIds = Object.keys(typeGroups).filter(tid =>
    typeMap[tid].parentId && !typeGroups[typeMap[tid].parentId]
  ).sort((a, b) => (typeMap[a].name || '').localeCompare(typeMap[b].name || ''));
  orphanChildIds.forEach(tid => {
    html += renderTypeBlock(typeMap[tid], typeGroups, typeMap, 0);
  });

  if (noTypeGoals.length > 0) {
    html += `<div class="type-block" style="border-right:4px solid #bbb;border-color:#e0e0e0;">
      <div class="type-block-header" style="border-bottom-color:#e0e0e0;">
        <span class="type-block-name" style="color:#999;">📋 ללא סוג</span>
        <span class="type-block-count" style="color:#bbb;">${noTypeGoals.length}</span>
      </div>`;
    noTypeGoals.forEach(g => html += renderGoalCard(g, '#999'));
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderTypeBlock(t, typeGroups, typeMap, depth) {
  const color = t.color;
  const goals = (typeGroups[t.id] || []).sort((a, b) => (a.name||'').localeCompare(b.name||''));
  const childIds = Object.keys(typeGroups).filter(tid =>
    typeMap[tid].parentId === t.id
  ).sort((a, b) => (typeMap[a].name || '').localeCompare(typeMap[b].name || ''));

  const isChild = depth > 0;

  let html = `<div class="type-block ${isChild ? 'type-block-child' : ''}" style="border-right:4px solid ${color};border-color:${color}22;">
    <div class="type-block-header" style="border-bottom-color:${color}22;">
      <span class="type-block-name" style="color:${color};">${isChild ? '└ ' : ''}${escHtml(t.name)}</span>
      <span class="type-block-count" style="color:${color};">${goals.length} ${goals.length === 1 ? 'מטרה' : 'מטרות'}${childIds.length > 0 ? ' · תת: ' + childIds.length : ''}</span>
    </div>`;

  goals.forEach(g => html += renderGoalCard(g, color));

  // Render child types nested
  childIds.forEach(cid => {
    html += renderTypeBlock(typeMap[cid], typeGroups, typeMap, depth + 1);
  });

  html += `</div>`;
  return html;
}

function renderGoalCard(g, typeColor) {
  const color = typeColor || '#999';
  const objs = getObjectivesForGoal(g.id);
  const completedObjs = objs.filter(o => o.status === 'completed').length;
  const hasBody = g.description || (objs.length > 0 && !g.single);
  let html = `<div class="goal-card type-layout" style="border-right-color:${color};" data-id="${g.id}">
    <div class="goal-card-header" onclick="${hasBody ? "this.nextElementSibling.classList.toggle('open');this.querySelector('.arrow').classList.toggle('open');" : ''}">
      <span class="goal-card-title">${escHtml(g.name)}</span>
      <span style="font-size:11px;color:var(--text3);">
        ${g.startDate ? g.startDate : ''}${g.startDate && g.endDate ? ' → ' : ''}${g.endDate ? g.endDate : ''}
      </span>
      <span class="goal-card-status ${g.status}">${goalStatusLabel(g.status)}</span>
      ${!g.single && objs.length > 0 ? `<span style="font-size:11px;color:var(--text3);background:var(--surface-hover);padding:1px 8px;border-radius:8px;">${completedObjs}/${objs.length}</span>` : ''}
      <span class="goal-actions" onclick="event.stopPropagation();">
        <button class="btn-icon" onclick="toggleGoalStatus('${g.id}')" title="החלף סטטוס">🔄</button>
        <button class="btn-icon" onclick="showGoalForm('${g.id}')" title="ערוך">✏️</button>
        <button class="btn-icon" onclick="deleteGoal('${g.id}')" title="מחק">🗑️</button>
      </span>
      ${hasBody ? '<span class="arrow" style="font-size:10px;color:var(--text3);transition:transform 0.2s;">▶</span>' : ''}
    </div>`;

  if (hasBody) {
    html += `<div class="goal-card-body">
      ${g.description ? `<div class="goal-card-desc">${escHtml(g.description)}</div>` : ''}`;
    if (!g.single && objs.length > 0) {
      objs.forEach(o => {
        html += `<div class="objective-card ${o.status === 'completed' ? 'completed' : ''}">
          <input type="checkbox" ${o.status === 'completed' ? 'checked' : ''} onchange="toggleObjectiveStatus('${o.id}')" style="flex-shrink:0;">
          <span class="objective-name">${escHtml(o.name)}</span>
          ${o.derech ? `<span class="objective-meta">דרך: ${escHtml(o.derech)}</span>` : ''}
          <span class="objective-status ${o.status}">${goalStatusLabel(o.status)}</span>
        </div>`;
      });
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// ---- Search ----
let searchTimer = null;

function doSearch(query) {
  clearTimeout(searchTimer);
  const resultsEl = document.getElementById('searchResults');
  query = query.trim();
  if (!query) { resultsEl.classList.remove('open'); return; }

  searchTimer = setTimeout(() => {
    const q = query.toLowerCase();
    const results = [];

    // Search tasks
    state.results.forEach(r => {
      let score = 0;
      const inTitle = r.title.toLowerCase().includes(q);
      const inDesc = r.description && r.description.toLowerCase().includes(q);
      if (inTitle) score = 3;
      else if (inDesc) score = 1;
      if (score > 0) results.push({ type: 'task', typeLabel: '📋 תוצאה', id: r.id, title: r.title, context: r.description || '', score, date: r.date });
    });

    // Search goal periods
    state.goalPeriods.forEach(p => {
      let score = 0;
      if (p.name.toLowerCase().includes(q)) score = 2;
      else if (p.description && p.description.toLowerCase().includes(q)) score = 1;
      if (score > 0) results.push({ type: 'period', typeLabel: '📅 תקופה', id: p.id, title: p.name, context: p.description || '', score });
    });

    // Search goals
    state.goals.forEach(g => {
      let score = 0;
      const inName = g.name.toLowerCase().includes(q);
      const inDesc = g.description && g.description.toLowerCase().includes(q);
      if (inName) score = 3;
      else if (inDesc) score = 1;
      if (score > 0) {
        const periodName = g.periodId ? (state.goalPeriods.find(p => p.id === g.periodId)?.name || '') : '';
        results.push({ type: 'goal', typeLabel: '🎯 מטרה', id: g.id, title: g.name, context: g.description || periodName ? `תקופה: ${periodName}` : '', score, goalId: g.id });
      }
    });

    // Search objectives
    state.objectives.forEach(o => {
      let score = 0;
      const inName = o.name.toLowerCase().includes(q);
      const inDerech = o.derech && o.derech.toLowerCase().includes(q);
      if (inName) score = 3;
      else if (inDerech) score = 1;
      if (score > 0) {
        const goalName = state.goals.find(g => g.id === o.goalId)?.name || '';
        results.push({ type: 'objective', typeLabel: '🎯 יעד', id: o.id, title: o.name, context: o.derech ? `דרך: ${o.derech}` : goalName ? `מטרה: ${goalName}` : '', score, goalId: o.goalId });
      }
    });

    results.sort((a, b) => b.score - a.score);

    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="search-empty">😕 לא נמצאו תוצאות</div>';
      resultsEl.classList.add('open');
      return;
    }

    resultsEl.innerHTML = results.map(r => {
      const title = escHtml(r.title);
      const ctx = escHtml(r.context);
      let onclick = '';
      if (r.type === 'task') onclick = `closeSearch();navigateToTaskDate('${r.id}')`;
      else if (r.type === 'goal' || r.type === 'objective') onclick = `closeSearch();switchTab('goals');setTimeout(()=>document.querySelector('.goal-card[data-id="${r.goalId}"]')?.scrollIntoView({behavior:'smooth',block:'center'}),100)`;
      else if (r.type === 'period') onclick = `closeSearch();switchTab('goals')`;
      return `<div class="search-result-item" onclick="${onclick}">
        <span class="sr-type">${r.typeLabel}</span>
        <span class="sr-title">${title}</span>
        ${ctx ? `<div class="sr-context">${ctx}</div>` : ''}
      </div>`;
    }).join('');
    resultsEl.classList.add('open');
  }, 200);
}

function closeSearch() {
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value = '';
}

function navigateToTaskDate(taskId) {
  const task = state.results.find(r => r.id === taskId);
  if (!task) return;
  if (task.date) {
    currentDate = parseDate(task.date);
    weekOffset = 0;
    selectedIds.clear();
    renderWeek();
    renderDay();
    switchTab('tasks');
    setTimeout(() => {
      const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  } else {
    // unscheduled
    switchTab('tasks');
    unscheduledOpen = true;
    document.getElementById('unscheduledBody').classList.add('open');
    document.getElementById('unscheduledToggle').classList.add('open');
    renderUnscheduled();
    setTimeout(() => {
      const card = document.querySelector(`#unscheduledList .task-card[data-id="${taskId}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

// Close search on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box') && document.getElementById('searchResults').classList.contains('open')) {
    closeSearch();
  }
});

// ---- Close modals on overlay click ----
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => {
    if (e.target === el) {
      if (el.id === 'goalPeriodModal') closeGoalPeriodForm();
      else if (el.id === 'goalModal') closeGoalForm();
      else if (el.id === 'goalTypeModal') closeGoalTypeForm();
    }
  });
});

// ---- Keyboard Shortcuts =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeSearch();
    if (document.getElementById('settingsModal').classList.contains('open')) closeSettings();
    if (document.getElementById('datePickerModal').classList.contains('open')) closeDatePicker();
    if (document.getElementById('addTaskForm').classList.contains('open') && !editingId) toggleTaskForm();
    if (document.getElementById('goalPeriodModal').classList.contains('open')) closeGoalPeriodForm();
    if (document.getElementById('goalModal').classList.contains('open')) closeGoalForm();
    if (document.getElementById('goalTypeModal').classList.contains('open')) closeGoalTypeForm();
    selectedIds.clear();
    renderDay();
  }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.getElementById('tabContentTasks').classList.contains('active')) {
    if (!document.getElementById('addTaskForm').classList.contains('open') && !e.target.closest('input,textarea,select')) toggleTaskForm();
  }
  // Ctrl+F or / to focus search
  if ((e.key === 'f' && (e.ctrlKey || e.metaKey)) || (e.key === '/' && !e.target.closest('input,textarea,select'))) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ===== INIT ON LOAD =====
init();

// Re-sync when coming back online
window.addEventListener('online', () => {
  const token = getGithubToken();
  const sha = getSha();
  if (token && sha) { setSyncStatus('syncing', 'שומר…'); syncToGitHub(false); }
});
